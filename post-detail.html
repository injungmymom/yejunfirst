<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세 페이지 - 사랑하는 교회</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">사랑하는 <span>교회</span></div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html#home">홈</a></li>
                    <li><a href="index.html#about">교회소개</a></li>
                    <li><a href="index.html#worship">예배안내</a></li>
                    <li><a href="index.html#news">교회소식</a></li>
                    <li><a href="index.html#location">오시는 길</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                    <span class="mode-icon">🌙</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="detail-header">
            <div class="container">
                <h1 id="post-title">상세 소식</h1>
            </div>
        </section>

        <section class="container">
            <div class="detail-content">
                <div class="article-meta">
                    <span id="post-date">2026.02.25</span>
                    <span id="post-category">교회소식</span>
                </div>
                <div class="article-body" id="post-content">
                    <p>내용을 불러오고 있습니다...</p>
                </div>
                <div style="margin-top: 50px;">
                    <a href="index.html#news" class="btn btn-primary">목록으로 돌아가기</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">사랑하는 교회</div>
                <p>&copy; 2026 사랑하는 교회. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Simple mock data for detail pages
        const posts = {
            '1': {
                title: '봄맞이 대청소 및 정원 가꾸기',
                date: '2026.02.22',
                content: `
                    <h2>함께 가꾸는 아름다운 성전</h2>
                    <p>안녕하세요, 사랑하는 교회 성도 여러분! 어느덧 차가운 겨울 바람이 물러가고 따뜻한 봄기운이 느껴지는 계절이 왔습니다.</p>
                    <p>우리 교회에서는 다가오는 부활절과 봄을 맞이하여 하나님의 성전을 더욱 아름답게 가꾸고자 '봄맞이 대청소 및 정원 가꾸기' 행사를 진행합니다.</p>
                    <p><strong>일시:</strong> 2026년 3월 7일 (토) 오전 10시<br>
                    <strong>장소:</strong> 교회 전 구역 및 정원<br>
                    <strong>준비물:</strong> 편한 복장, 즐거운 마음</p>
                    <p>청소 후에는 맛있는 점심 식사가 준비되어 있으니, 많은 성도님들의 관심과 참여 부탁드립니다. 우리가 함께 땀 흘려 가꾼 이 공간이 누군가에게는 쉼터가 되고, 하나님께는 영광이 되는 귀한 자리가 되길 소망합니다.</p>
                `
            },
            '2': {
                title: '청년부 연합 수련회 안내',
                date: '2026.02.15',
                content: `
                    <h2>'함께 걷는 길' - 2026 청년부 연합 수련회</h2>
                    <p>하나님의 사랑 안에서 깊은 교제와 영적 회복을 꿈꾸는 청년부 여러분을 초대합니다!</p>
                    <p>이번 수련회는 복잡한 일상을 잠시 내려놓고, 우리 삶의 진정한 동반자 되시는 예수님과 함께 걷는 법을 배우는 소중한 시간이 될 것입니다.</p>
                    <p><strong>일시:</strong> 2026년 3월 20일(금) ~ 22일(일)<br>
                    <strong>장소:</strong> 강화 은혜 수양관<br>
                    <strong>주제:</strong> 함께 걷는 길 (이사야 43:1-2)</p>
                    <p>특별 강사님과 함께하는 말씀 집회, 뜨거운 찬양, 그리고 청년들의 고민을 나누는 소그룹 모임 등 풍성한 프로그램이 준비되어 있습니다. 기도로 준비하며 은혜의 현장에서 만납시다!</p>
                `
            },
            '3': {
                title: '새가족 환영회 및 교육 일정',
                date: '2026.02.08',
                content: `
                    <h2>사랑하는 교회에 오신 것을 환영합니다!</h2>
                    <p>우리 교회에 새로 등록하신 모든 성도님들을 진심으로 환영하며 축복합니다.</p>
                    <p>새가족 여러분이 교회 공동체에 잘 적응하고, 신앙의 기초를 든든히 세울 수 있도록 돕는 '새가족 4주 교육'과 환영회를 개최합니다.</p>
                    <p><strong>교육 기간:</strong> 매주 주일 오후 1시 (4주간)<br>
                    <strong>장소:</strong> 2층 새가족실<br>
                    <strong>내용:</strong> 교회 소개, 구원의 확신, 신앙 생활의 기초, 공동체 생활</p>
                    <p>교육을 마친 분들께는 수료 선물과 함께 담임 목사님과의 오찬 자리가 마련됩니다. 궁금하신 점은 행정실로 문의해 주세요.</p>
                `
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId && posts[postId]) {
            const post = posts[postId];
            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-date').textContent = post.date;
            document.getElementById('post-content').innerHTML = post.content;
            document.title = post.title + ' - 사랑하는 교회';
        } else {
            document.getElementById('post-content').innerHTML = '<p>게시물을 찾을 수 없습니다.</p>';
        }
    </script>
</body>
</html>
